<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
</head>
<body> 
   <h2>Student Details</h2>
   <form>
    <label>Gender:</label><br>
    <input type="radio" name="gender" value="Male" required> Male
    <input type="radio" name="gender" value="Female" required> Female

    <label>Languages known:</label><br>
    <input type="checkbox" value="Tamil" required> Tamil
    <input type="checkbox" value="English" required> English
    <input type="checkbox" value="Hindi" required> Hindi<br><br>

    <label>Course Applying For:</label>
    <select required>
        <option value="">---Select---</option>
        <option>BE</option>
        <option>BCA</option>
        <option>B.Sc</option>
        <option>B.com</option>
    </select><br><br>

    <label>Address:</label>
    <textarea rows="4" cols="30" required></textarea><br></br>

    <input type="submit" value="Submit Form">
    <input type="reset" value="Clear All">
   </form>
</body>
</html>
