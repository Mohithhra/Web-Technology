
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronForge | Reset Password</title>
<link rel="stylesheet" href="reset-password.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

</head>
<body>

<div class="card">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo">IRON<span>FORGE</span></div>
    <div class="logo-tagline">Forge Your Legacy</div>
  </div>

  <!-- ── FORM PANEL ── -->
  <div id="resetFormPanel">
    <div class="card-title">Reset Password</div>
    <div class="card-subtitle">Create a new password for your account.</div>
    <div class="email-pill" id="resetEmailDisplay"></div>

    <div id="resetError"></div>

    <div class="form-group">
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" id="newPassword" class="form-input" placeholder="Min 8 characters" autocomplete="new-password">
        <button class="eye-btn" onclick="toggleVisibility('newPassword',this)" type="button">👁️</button>
      </div>
      <div class="strength-wrap">
        <div class="strength-track"><div id="strengthBar"></div></div>
        <span id="strengthLabel"></span>
      </div>
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      <div class="input-wrap">
        <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat new password" autocomplete="new-password">
        <button class="eye-btn" onclick="toggleVisibility('confirmPassword',this)" type="button">👁️</button>
      </div>
    </div>

    <button class="btn-primary" id="resetBtn" onclick="handleReset()">🔑 Update Password</button>

    <div class="back-link">
      Remember your password? <a href="login.html">Back to Login</a>
    </div>
  </div>

  <!-- ── SUCCESS PANEL ── -->
  <div id="resetSuccessPanel">
    <span class="success-icon">✅</span>
    <div class="success-title">Password Updated!</div>
    <p class="success-desc">
      Your password has been successfully changed.<br>
      <strong>You can now log in with your new password.</strong>
    </p>
    <button class="btn-primary" onclick="goToLogin()">🚀 Go to Login</button>
    <div class="back-link" style="margin-top:1rem">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<script src="reset-password.js"></script>
</body>
</html>
