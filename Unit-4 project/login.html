<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronForge Gym | Login</title>
<link rel="stylesheet" href="login.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <h2>Login to IronForge</h2>

    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" required>
          <span class="toggle-password">👁️</span>
        </div>
      </div>

      <div class="options">
        <label class="remember-me"><input type="checkbox"> Remember me</label>
        <a href="forgot-password.html" class="forgot">Forgot Password?</a>
      </div>

      <button type="submit" class="btn">Login</button>
      <li><a href="dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a></li>

      <p class="auth-links">
        New here? <a href="signup.html">Sign Up</a>
      </p>

      <div class="divider">OR</div>

      <button type="button" class="btn social-btn google-btn">Login with Google</button>
      <button type="button" class="btn social-btn facebook-btn">Login with Facebook</button>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
