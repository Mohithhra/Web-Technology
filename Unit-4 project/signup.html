<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronForge Gym | Sign Up</title>
<link rel="stylesheet" href="signup.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <h2>Create Your Account</h2>

    <form id="signupForm">
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" required>
          <span class="toggle-password">👁️</span>
        </div>
        <div class="password-strength">
          <div class="strength-bar"></div>
          <p class="strength-text">Password Strength</p>
        </div>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      </div>

      <button type="submit" class="btn">Sign Up</button>

      <p class="auth-links">
        Already have an account? <a href="login.html">Login</a>
      </p>

      <div class="divider">OR</div>

      <button type="button" class="btn social-btn google-btn">Sign Up with Google</button>
      <button type="button" class="btn social-btn facebook-btn">Sign Up with Facebook</button>
    </form>
  </div>
</div>

<script src="signup.js"></script>
</body>
</html>
