
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronForge Gym | Forgot Password</title>
<link rel="stylesheet" href="forgot-password.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <!-- Step 1: Enter Email -->
    <div id="step1">
      <div class="icon">🔑</div>
      <h2>Forgot Password?</h2>
      <p class="subtitle">No worries! Enter your registered email and we'll send you a reset link.</p>

      <form id="forgotForm">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
      </form>

      <p class="auth-links">
        <a href="login.html">← Back to Login</a>
      </p>
    </div>

    <!-- Step 2: Email Sent Confirmation -->
    <div id="step2" class="hidden">
      <div class="icon">📧</div>
      <h2>Check Your Email</h2>
      <p class="subtitle">We've sent a password reset link to <span id="sentEmail" class="highlight"></span>. Check your inbox!</p>

      <button class="btn" onclick="resendEmail()">Resend Email</button>

      <p class="auth-links">
        <a href="login.html">← Back to Login</a>
      </p>
    </div>

  </div>
</div>

<!-- EmailJS CDN — must be before forgot-password.js -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="forgot-password.js"></script>
</body>
</html>
